# ════════════════════════════════════════════════════════════════════
#  YLF Church — GitHub Actions CI Workflow
#  File location: .github/workflows/ci.yml
#
#  Runs on every push to main and on pull requests.
#  Checks: ESLint + TypeScript — catches errors before Vercel deploys.
# ════════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run ESLint
      - name: Run ESLint
        run: npm run lint

      # 5. Run TypeScript type check
      - name: Run TypeScript check
        run: npm run type-check

  # Optional: Build check (verifies the project compiles cleanly)
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    env:
      # Dummy env vars so Next.js build does not fail during CI
      # Real values live in Vercel environment variables — NOT here
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: production
      NEXT_PUBLIC_SITE_URL: https://ylf.church

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
